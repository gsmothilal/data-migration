name: Terraform CI/CD
on: { push: { branches: ["main"] } }
env: { TF_VERSION: "1.6.0" }
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with: { terraform_version: ${{ env.TF_VERSION }} }
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform fmt -check
      - run: terraform validate
      - run: terraform plan -out=tfplan -input=false -var="account_id=${{ secrets.AWS_ACCOUNT_ID }}" -var="redshift_master_password=${{ secrets.REDSHIFT_MASTER_PASSWORD }}" -var="s3_bucket_name=${{ secrets.S3_BUCKET_NAME }}"
      - if: github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve tfplan
